<!-- Promoted Opportunity -->
<div class="job-card sponsored" data-media-type="kenya-teaching-vacancies-button">
    <span class="sponsored-label">Promoted Opportunity</span>
    <!-- <div class="promo-belt">Promoted</div> -->
    <div class="job-header">
        <div class="job-school-info">
            <img src="https://storage.googleapis.com/banani-avatars/avatar%2Ffemale%2F18-25%2FAfrican%2F1" class="school-logo" alt="School Logo">
            <div class="school-details">
                <h3>{{job.employer.school}}</h3>
                <span>
                    {{job.county}} County
                    <span class="verified-badge">
                        <iconify-icon icon="lucide:badge-check" style="font-size: 14px"></iconify-icon>
                    </span>
                </span>
            </div>
        </div>
        <div style="color: var(--muted-foreground); font-size: 13px">
            {{job.days_posted}} ago
        </div>
    </div>
    <div class="job-content">
        <h2>{{job.job_title}}</h2>
        <div class="job-tags">
            <span class="tag">{{job.employment_type}}</span>
            {% if job.tsc_required is True %}
                <span class="tag">TSC Required</span>
            {% endif %}
            <span class="tag salary-tag">KSh {{job.convertSalaryMin}}k - {{job.convertSalaryMax}}k</span>
        </div>
        <p style="
    font-size: 14px;
    color: var(--primary-foreground);
    margin: 0;
    line-height: 1.5;
    overflow: hidden;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    ">
            {{job.job_description}}
        </p>
    </div>
    <div class="job-actions">
        <div class="action-group">
            <a href="jobs/savejob/{{job.id}}" class="btn btn-primary">
                <iconify-icon icon="lucide:heart" style="font-size: 18px"></iconify-icon>
                Save
            </a>
            <button class="btn">
                <iconify-icon icon="lucide:share-2" style="font-size: 18px"></iconify-icon>
                Share
            </button>
        </div>
        <a href="/jobs/applyjob/{{job.id}}" class="btn btn-primary" data-media-type="kenya-teaching-vacancies-button">
            Apply Now
        </a>
    </div>
</div>
