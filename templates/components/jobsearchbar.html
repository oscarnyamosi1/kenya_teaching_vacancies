  <form action='/jobs/search'  class="card glass" style="padding: 20px;">
    <h2 style="margin: 0 0 16px; font-size: 20px; font-weight: 600;">
      Find your next teaching role 🇰🇪
    </h2>
    <div style="display: flex; gap: 12px;">
      <input name='jobquery' placeholder="Subject,Town,County,School or Job Title" style="
        flex: 1;
