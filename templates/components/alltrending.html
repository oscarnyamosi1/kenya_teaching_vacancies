<!-- Trending Jobs Card -->
<div class="menu-card glass" style="padding:16px; margin-bottom:16px; border-radius:16px;">
    <h4 style="margin:0 0 16px 0; font-size:16px; font-weight:700; color:white;">
        Trending Now
    </h4>

    <div class="trending-list" style="display:flex;flex-direction:column;gap:12px;">
        {% for job in trending_jobs %}
        <div class="trending-item glass" data-media-type="kenya-teaching-vacancies-button" 
             style="display:flex;align-items:center;gap:12px;padding:8px;border-radius:12px;cursor:pointer;transition:all 0.3s ease;">
            
            <!-- Logo / Thumbnail -->
            <div style="width:40px;height:40px;border-radius:12px;overflow:hidden;background:rgba(255,255,255,0.08);flex-shrink:0;">
                <img src="{{ job.logo_url|default:'https://via.placeholder.com/40' }}" 
                     style="width:100%;height:100%;object-fit:cover;">
            </div>

            <!-- Info -->
            <div class="trending-info" style="flex:1;display:flex;flex-direction:column;justify-content:center;">
                <h4 style="margin:0;font-size:14px;font-weight:600;color:white;">{{ job.title }}</h4>
                <p style="margin:2px 0 0 0;font-size:12px;color:rgba(255,255,255,0.6);">
                    {{ job.school }} • {{ job.applicants }} applicants
                </p>
            </div>

        </div>
        {% endfor %}
    </div>

    <button class="btn primary" style="width:100%; margin-top:12px; font-size:12px;">
        View All Trending
    </button>
</div>

<script>
// Hover Glow Effect for Trending Items
document.querySelectorAll('.trending-item').forEach(item => {
    item.addEventListener('mousemove', e => {
        const rect = item.getBoundingClientRect()
        const x = e.clientX - rect.left
        const y = e.clientY - rect.top

        item.style.setProperty('--glow', `radial-gradient(circle at ${x}px ${y}px, rgba(255,255,255,0.15), transparent 60%)`)
    })

    item.addEventListener('mouseleave', () => {
        item.style.removeProperty('--glow')
    })
})
</script>
