{% extends '../index.html' %}
{% load static %}

{% block pagename %} settings {% endblock pagename %}

{% block center_feed_content %}
<style>
/* PANEL */
.settings-panel {
    padding: 6px 0;
    border-radius: 16px;
}

/* ROW */
.settings-row {
    display: flex;
    justify-content: space-between;
    align-items: center;

    padding: 14px 18px;
    border-bottom: 1px solid var(--border);

    transition: background 0.2s ease;
}

.settings-row:hover {
    background: rgba(255,255,255,0.04);
}

/* TEXT */
.settings-label {
    font-size: 14px;
    font-weight: 600;
    color: var(--foreground);
    display: flex;
    align-items: center;
    gap: 8px;
}

.settings-value {
    font-size: 13px;
    color: var(--muted-foreground);
    margin-top: 2px;
}

/* RIGHT BUTTON */
.settings-action {
    width: 36px;
    height: 36px;
    border-radius: 10px;
}

/* EXPANDABLE */
.settings-expand {
    display: none;
    padding: 16px 18px;
    border-top: 1px solid var(--border);
    animation: slideDown 0.25s ease;
}

/* INPUT */
.input-group {
    display: flex;
    flex-direction: column;
    gap: 6px;
}

.input-wrapper {
    background: rgba(255,255,255,0.05);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 10px;
}

.input-wrapper input {
    width: 100%;
    background: transparent;
    border: none;
    outline: none;
    color: var(--foreground);
}

/* ACTIONS */
.settings-actions {
    display: flex;
    justify-content: flex-end;
    gap: 10px;
    margin-top: 14px;
}

/* ANIMATION */
@keyframes slideDown {
    from {
        opacity: 0;
        transform: translateY(-6px);
    }
    to {
        opacity: 1;
        transform: translateY(0);
    }
}
</style>

<div class="content-container">

  <!-- Page Title -->
  <h2 class="page-title">
    <i class="fa fa-lock"></i> Change Password
  </h2>

  <!-- SETTINGS GROUP -->
  <div class="glass card settings-panel">

    <!-- PASSWORD ROW -->
    <div class="settings-row" id="passwordRow">

      <!-- LEFT -->
      <div class="settings-info">
        <div class="settings-label">
          <i class="fa fa-key"></i> Password
        </div>
        <div class="settings-value">********</div>
      </div>

      <!-- RIGHT ACTION -->
      <button id="changepasswordbtn" class="btn btn-ghost settings-action">
        <i class="fa fa-pencil"></i>
      </button>

    </div>

    <!-- EXPANDABLE INLINE FORM -->
    <div id="passwordForm" class="settings-expand glass">

      <form action="/teachers/change-password/" method="post">
        {% csrf_token %}

        <!-- NEW PASSWORD -->
        <div class="input-group">
          <label for="newpassword1"><i class="fa fa-lock"></i> New Password</label>
          <div class="input-wrapper">
            <input 
              id="newpassword1"
              name="newpassword1"
              type="password"
              placeholder="Enter new password"
              required
            >
          </div>
        </div>

        <!-- REPEAT PASSWORD -->
        <div class="input-group">
          <label for="newpassword2"><i class="fa fa-lock"></i> Repeat Password</label>
          <div class="input-wrapper">
            <input 
              id="newpassword2"
              name="newpassword2"
              type="password"
              placeholder="Repeat new password"
              required
            >
          </div>
        </div>

        <!-- ACTIONS -->
        <div class="settings-actions">
          <button type="button" id="cancelPassword" class="btn btn-ghost">
            Cancel
          </button>

          <button type="submit" class="btn btn-primary">
            <i class="fa fa-check"></i> Save
          </button>
        </div>

      </form>
    </div>

  </div>

</div>

<script>
    const changePasswordBtn = document.getElementById('changepasswordbtn');
    const passwordForm = document.getElementById('passwordForm');
    const cancelPasswordBtn = document.getElementById('cancelPassword');

    changePasswordBtn.addEventListener('click', () => {
        passwordForm.style.display = 'block';
    });

    cancelPasswordBtn.addEventListener('click', () => {
        passwordForm.style.display = 'none';
    });
</script>

{% endblock %}
